{% extends "base.html" %}

{% block title %}Sign in — Kairo{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center p-6">
  <section class="w-full max-w-sm bg-white rounded-2xl shadow-sm p-8">
    <h1 class="text-2xl font-semibold mb-6">Kairo</h1>

    {% if sent %}
      <p class="text-sm text-slate-700">
        If your email is registered, a sign-in link is on its way. Check your inbox.
      </p>
    {% else %}
      <form method="post" action="/login" class="space-y-4">
        <label class="block">
          <span class="text-sm text-slate-700">Email</span>
          <input
            type="email"
            name="email"
            required
            autofocus
            class="mt-1 block w-full rounded-md border-slate-300 shadow-sm"
          />
        </label>
        <button
          type="submit"
          class="w-full rounded-md bg-slate-900 text-white py-2 text-sm font-medium hover:bg-slate-800"
        >
          Send magic link
        </button>
      </form>
    {% endif %}
  </section>
</main>
{% endblock %}
