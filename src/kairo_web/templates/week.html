{% extends "base.html" %}

{% block title %}{{ workspace.name }} — Week {{ iso_week }}, {{ iso_year }}{% endblock %}

{% block content %}
<main class="max-w-5xl mx-auto p-6">
  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">

    {% include "partials/_topbar.html" %}
    {% include "partials/_capture.html" %}
    {% include "partials/week_main.html" %}
  </div>
  <div class="flex px-1 pt-2 text-[10px] text-slate-400">
    <span class="ml-auto">v{{ app_version }}</span>
  </div>
</main>
{% endblock %}
